name: Release

# Builds and packs the release on any v*.*.* tag, but never publishes on its own.
# Publishing to nuget.org happens only through a deliberate manual run of this
# workflow with publish=true — and only once a maintainer has added the
# NUGET_API_KEY repository secret. A plain tag push produces verified packages as
# build artifacts for review; it does not release them.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish packages to nuget.org (leave unchecked to only build and pack)'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output artifacts

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      - name: Publish to nuget.org
        # Gate: only a manual workflow_dispatch with publish=true reaches this step.
        # Tag pushes stop after packing. Publishing 1.0.0 is an opt-in maintainer action.
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
